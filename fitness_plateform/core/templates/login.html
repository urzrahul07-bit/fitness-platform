{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}


.login-box{
    width:360px;
    background:#fff;
    padding:30px 28px;
    border-radius:6px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.login-box h2{
    font-size:26px;
    margin-bottom:10px;
    color:#222;
}

.login-box .small-text{
    font-size:13px;
    margin-bottom:20px;
    color:#555;
}

.login-box .small-text a{
    color:maroon;
    text-decoration:none;
    font-weight:600;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    font-size:13px;
    margin-bottom:6px;
    color:#333;
}

.form-group input{
    width:100%;
    padding:10px 12px;
    border:1px solid #ccc;
    border-radius:4px;
    outline:none;
    font-size:14px;
}

.password-row{
    display:flex;
    align-items:center;
    gap:8px;
}

.show-btn{
    font-size:13px;
    color:#007c89;
    cursor:pointer;
    white-space:nowrap;
}

.checkbox-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin:15px 0;
    font-size:13px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:maroon;
    color:#fff;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.login-btn:hover{
    background:green;
}

.links{
    margin-top:18px;
    font-size:13px;
    text-align:left;
}

.links a{
    color:#007c89;
    text-decoration:none;
    margin-right:12px;
    display:inline-block;
    margin-bottom:8px;
}
    .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-box{
    width:360px;
    background:#fff;
    padding:25px;
    border-radius:6px;
    position:relative;
}

.modal-box h3{
    margin-bottom:15px;
}

.close-btn{
    position:absolute;
    right:10px;
    top:5px;
    font-size:22px;
    cursor:pointer;
}
.login-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top: 10%;
}
</style>
</head>

<body>
{% include "navbar.html" %}
<div class="login-wrapper">
<div class="login-box">

    <h2>Log in</h2>

    <div class="small-text">
        Need a Membership account? <a href="javascript:void(0)" onclick="openRegisterModal()">Create an account</a>
    </div>
   
    <form method="post">
        <!-- Django CSRF -->
        {% csrf_token %} 

        <div class="form-group">
            <label>Username or Email</label>
            <input type="text" name="username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-row">
                <input type="password" id="password" name="password">
                <span class="show-btn" onclick="togglePassword()"></span>
            </div>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" name="remember" required>
            <span>Keep me logged in</span>
        </div>

        <button type="submit" class="login-btn">Log in</button>

        <div class="links">
            <a href="#">Forgot username?</a>
            <a href="#">Forgot password?</a><br>
            <a href="#">Can't log in?</a>
        </div>

    </form>
     <!-- Register Modal -->
<div class="modal-overlay" id="registerModal">

    <div class="modal-box">

        <h3>Create Account</h3>

        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div style="margin-top:15px;">
                <button type="submit" class="login-btn">Create account</button>
            </div>

        </form>

        <span class="close-btn" onclick="closeRegisterModal()">×</span>

    </div>
</div>
</div>
</div>

<script>
function togglePassword(){
    const pass = document.getElementById("password");
    if(pass.type === "password"){
        pass.type = "text";
    }else{
        pass.type = "password";
    }
}
</script>
    <script>
function openRegisterModal(){
    document.getElementById("registerModal").style.display = "flex";
}

function closeRegisterModal(){
    document.getElementById("registerModal").style.display = "none";
}
</script>

</body>
</html>
