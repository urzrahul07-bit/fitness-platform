<h2>My Orders</h2>

<table border="1">

<tr>
<th>Order ID</th>
<th>Date</th>
<th>Total</th>
<th>Invoice</th>
</tr>

{% for order in orders %}

<tr>
<td>#{{ order.id }}</td>
<td>{{ order.created_at }}</td>
<td>₹{{ order.total }}</td>

<td>
<a href="{% url 'download_invoice' order.id %}">
Download Invoice
</a>
</td>

</tr>

{% endfor %}

</table>
