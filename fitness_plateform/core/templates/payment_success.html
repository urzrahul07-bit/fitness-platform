<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Order Confirmed</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{

    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
    width:420px;

}

.success-icon{

    font-size:70px;
    color:#28a745;
    margin-bottom:15px;

}

h1{
    margin:10px 0;
}

p{
    color:#555;
}

.order-id{
    background:#f3f3f3;
    padding:10px;
    border-radius:6px;
    margin:15px 0;
    font-size:14px;
}

.buttons{
    margin-top:25px;
}

.btn{

    display:inline-block;
    padding:12px 18px;
    border-radius:6px;
    text-decoration:none;
    margin:5px;
    font-weight:bold;

}

.shop{
    background:#ff4d4d;
    color:white;
}

.orders{
    background:#222;
    color:white;
}

.redirect-text{

    margin-top:20px;
    font-size:13px;
    color:#777;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="success-icon">✔</div>

<h1>Payment Successful</h1>

<p>Your order has been placed successfully.</p>

<div class="order-id">
Order ID : #{{ order_id}}
</div>

<div class="buttons">

<a href="/orders/" class="btn orders">
View Orders
</a>

<a href="/shop/" class="btn shop">
Continue Shopping
</a>

</div>

<div class="redirect-text">

Redirecting to your order history in <span id="countdown">10</span> seconds...

</div>

</div>

</div>

<script>

let time = 10;

let timer = setInterval(function(){

    time--;

    document.getElementById("countdown").innerText = time;

    if(time <= 0){

        clearInterval(timer);

        window.location.href = "/orders/";

    }

},1000);

</script>

</body>
</html>
