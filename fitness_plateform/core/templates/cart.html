{% load static %}
{% include "navbar.html" %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cart</title>

<style>
.cart-wrapper{
    max-width:1100px;
    margin:60px auto;
    display:grid;
    
    gap:30px;
    font-family:Arial, sans-serif;
    
}

.cart-bbox,.total-box{
    background:#f7f7f7;
    border-radius:16px;
    padding:25px;
}

.cart-row{
    display:grid;
    grid-template-columns: 30px 70px 1fr 90px 100px 100px;
    align-items:center;
    gap:12px;
    padding:18px 0;
    border-bottom:1px solid #ddd;
}

.cart-row img{
    width:60px;
}

.remove a{
    color:red;
    font-size:20px;
    text-decoration:none;
}

.qty-input{
    width:60px;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

.price,.subtotal{
    font-weight:600;
}

.update-btn{
    margin-top:20px;
    background:#e44b4b;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:20px;
    cursor:pointer;
}

.total-box h3{
    margin-bottom:20px;
}

.total-row{
    display:flex;
    justify-content:space-between;
    margin:14px 0;
    font-weight:600;
}

.checkout-btn{
    margin-top:25px;
    width:100%;
    padding:14px;
    background:#e11b22;
    border:none;
    border-radius:30px;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="cart-wrapper">

<!---------------- LEFT CART ---------------->
<div class="cart-bbox">

<div class="cart-row" style="font-weight:bold">
    <div></div>
    <div></div>
    <div>Product</div>
    <div>Price</div>
    <div>Quantity</div>
    <div>Subtotal</div>
</div>

{% for item in cart_items %}

<div class="cart-row">

    <div class="remove">
        <a href="{% url 'remove_from_cart' item.key %}">X</a>
    </div>

    <div>
        <img src="{{ item.image }}" width="80">
    </div>

    <div>{{ item.name }}</div>

    <div class="price">₹ {{ item.price }}</div>

    <div>
        <form action="{% url 'update_cart' item.key %}" method="get">
            <input class="qty-input"
                   type="number"
                   name="qty"
                   value="{{ item.qty }}"
                   min="1"
                   onchange="this.form.submit()">
        </form>
    </div>

    <div class="subtotal">
        ₹ {{ item.subtotal }}
    </div>

</div>

{% empty %}
<p>Your cart is empty.</p>
{% endfor %}

<!---------------- RIGHT TOTALS ---------------->
<div class="total-box">

<h3>Cart Totals</h3>

<div class="total-row">
    <span>Subtotal</span>
    <span>₹ {{ cart_total }}</span>
</div>

<hr>

<div class="total-row">
    <span>Total</span>
    <span>₹ {{ cart_total }}</span>
</div>

<a href="{% url 'checkout' %}">
    <button class="checkout-btn">PROCEED TO CHECKOUT</button>
</a>

</div>

</div>

</body>
</html>
