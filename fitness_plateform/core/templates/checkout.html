<!DOCTYPE html>
<head>
    <style>
        /* ===============================
   Checkout Layout
================================ */

.checkout-wrapper{
    max-width:1200px;
    margin:60px auto;
    display:grid;
    grid-template-columns: 2fr 1.2fr;
    gap:30px;
    padding:0 15px;
}

/* ===============================
   Billing box
================================ */

.billing-box{
    background:#f7f7f7;
    padding:30px;
    border-radius:10px;
}

.billing-box h3{
    margin-bottom:20px;
    font-size:20px;
    font-weight:600;
}

/* form grid */
.billing-box form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* full width fields */
.billing-box input:nth-child(3),
.billing-box input:nth-child(4),
.billing-box input:nth-child(5),
.billing-box input:nth-child(6),
.billing-box input:nth-child(7),
.billing-box input:nth-child(8),
.billing-box input:nth-child(9),
.billing-box input:nth-child(10){
    grid-column:1 / -1;
}

.billing-box input{
    height:46px;
    padding:0 14px;
    border:none;
    border-radius:6px;
    outline:none;
    background:#fff;
    font-size:14px;
}

.billing-box input:focus{
    box-shadow:0 0 0 2px rgba(255,0,0,.15);
}

/* ===============================
   Order box
================================ */

.order-box{
    background:#f7f7f7;
    padding:28px;
    border-radius:10px;
    height:fit-content;
}

.order-box h3{
    margin-bottom:18px;
    font-size:20px;
    font-weight:600;
}

/* header row */
.order-head{
    display:flex;
    justify-content:space-between;
    font-weight:600;
    padding-bottom:10px;
    border-bottom:1px solid #ddd;
    margin-bottom:10px;
}

/* product row */
.order-row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    font-size:14px;
}

.order-row span:last-child{
    font-weight:600;
}

/* divider */
.order-box hr{
    border:none;
    border-top:1px solid #ddd;
    margin:12px 0;
}

/* total rows */
.order-row b{
    font-size:15px;
}

/* ===============================
   Place order button
================================ */

.place-order-btn{
    width:100%;
    margin-top:15px;
    height:48px;
    border:none;
    border-radius:30px;
    background:#e11b22;
    color:#fff;
    font-weight:600;
    letter-spacing:.5px;
    cursor:pointer;
    transition:.2s ease;
}

.place-order-btn:hover{
    background:#c8161c;
}

/* ===============================
   Responsive
================================ */

@media(max-width:900px){
    .checkout-wrapper{
        grid-template-columns:1fr;
    }

    .billing-box form{
        grid-template-columns:1fr;
    }
}
    </style>
</head>
<body>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<div class="checkout-wrapper">

<!-- Billing Form -->
<div class="billing-box">

<h3>Billing Details</h3>

<form id="checkout-form">

<input type="text" name="first_name" placeholder="First name" required>
<input type="text" name="last_name" placeholder="Last name" required>
<input type="text" name="address" placeholder="Street address" required>
<input type="text" name="city" placeholder="Town / City" required>
<input type="text" name="state" placeholder="State" required>
<input type="text" name="zip" placeholder="ZIP Code" required>
<input type="text" name="phone" placeholder="Phone" required>
<input type="email" name="email" placeholder="Email" required>

<button type="submit" id="pay-btn" class="place-order-btn">
PLACE ORDER
</button>

</form>

</div>


<!-- Order Summary -->
<div class="order-box">

<h3>Your Order</h3>

<div class="order-head">
<span>Product</span>
<span>Subtotal</span>
</div>

{% for item in order_items %}

<div class="order-row">
<span>{{ item.name }} × {{ item.qty }}</span>
<span>₹ {{ item.line_total }}</span>
</div>

{% endfor %}

<hr>

<div class="order-row">
<b>Subtotal</b>
<b>₹ {{ subtotal }}</b>
</div>

<div class="order-row">
<b>Total</b>
<b>₹ {{ total }}</b>
</div>

</div>

</div>
<script>

var options = {

    "key": "{{ razorpay_key }}",
    "order_id": "{{ razorpay_order_id }}",
    "name": "Beast Nation Gym",
    "description": "Order Payment",

    "handler": function (response){

        window.location.href = "/payment-success/{{ order_id }}/";
    },

    "theme": {
        "color": "#e11b22"
    }

};

var rzp = new Razorpay(options);

document.getElementById("checkout-form").onsubmit = function(e){

    e.preventDefault();

    if(this.checkValidity()){

        rzp.open();

    }

}

</script>

</body>
